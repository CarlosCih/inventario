{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <div class="mb-3">
                        <i class="fa fa-folder fs-1 text-primary"></i>
                    </div>
                    <h6 class="card-title fw-bold mb-2">Categorías</h6>
                    <p class="text-muted small mb-3">Gestionar categorías</p>
                    <a href="{% url 'catalogs:list' %}" class="btn btn-sm btn-primary">Ver Categorías</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <div class="mb-3">
                        <i class="fa fa-clipboard fs-1 text-primary"></i>
                    </div>
                    <h6 class="card-title fw-bold mb-2">Estados</h6>
                    <p class="text-muted small mb-3">Gestionar estados</p>
                    <a href="{% url 'catalogs:list' %}" class="btn btn-sm btn-primary">Ver Estados</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <div class="mb-3">
                        <i class="fa fa-tags fs-1 text-primary"></i>
                    </div>
                    <h6 class="card-title fw-bold mb-2">Marcas</h6>
                    <p class="text-muted small mb-3">Gestionar marcas</p>
                    <a href="{% url 'catalogs:list' %}" class="btn btn-sm btn-primary">Ver Marcas</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <div class="mb-3">
                        <i class="fa fa-cubes fs-1 text-primary"></i>
                    </div>
                    <h6 class="card-title fw-bold mb-2">Modelos</h6>
                    <p class="text-muted small mb-3">Gestionar modelos</p>
                    <a href="{% url 'catalogs:list' %}" class="btn btn-sm btn-primary">Ver Modelos</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <div class="mb-3">
                        <i class="fa fa-balance-scale fs-1 text-primary"></i>
                    </div>
                    <h6 class="card-title fw-bold mb-2">Unidades</h6>
                    <p class="text-muted small mb-3">Gestionar unidades</p>
                    <a href="{% url 'catalogs:list' %}" class="btn btn-sm btn-primary">Ver Unidades</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
